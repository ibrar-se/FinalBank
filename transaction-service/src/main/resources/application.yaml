server:
  port: 8082 # Running internally on port 8082

spring:
  application:
    name: transaction-service

  datasource:
    # PIVOT 1: Changed 'localhost:5433' to the internal container name 'transaction-db' on standard port 5432
    url: jdbc:postgresql://transaction-db:5432/transaction_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    # PIVOT 2: Changed from localhost:9094 to the internal container broker listener
    bootstrap-servers: kafka:9092
    consumer:
      group-id: transaction-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      # PIVOT 3: Changed from localhost:9094 to the internal container broker listener
      bootstrap-servers: kafka:9092
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    com.logicminers.banking: INFO