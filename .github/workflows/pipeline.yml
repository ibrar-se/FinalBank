name: Logic Miners Enterprise CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push-microservices:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Workspace Code
        uses: actions/checkout@v3

      - name: 1.1. Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: 1.2. Build Microservices with Maven
        run: |
          cd auth-service && mvn clean package -DskipTests && cd ..
          cd account-service && mvn clean package -DskipTests && cd ..
          cd transaction-service && mvn clean package -DskipTests && cd ..
          cd beneficiary-service && mvn clean package -DskipTests && cd ..
          cd fraud-service && mvn clean package -DskipTests && cd ..
          cd ledger-service && mvn clean package -DskipTests && cd ..
          cd gateway-service && mvn clean package -DskipTests && cd ..

      - name: 2. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 3. Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ibrar09
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🟢 ADDED: Auth Service Build & Push
      - name: 4. Build & Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ibrar09/auth-service:latest

      - name: 5. Build & Push Account Service
        uses: docker/build-push-action@v5
        with:
          context: ./account-service
          push: true
          tags: ibrar09/account-service:latest

      - name: 6. Build & Push Transaction Service
        uses: docker/build-push-action@v5
        with:
          context: ./transaction-service
          push: true
          tags: ibrar09/transaction-service:latest

      - name: 7. Build & Push Beneficiary Service
        uses: docker/build-push-action@v5
        with:
          context: ./beneficiary-service
          push: true
          tags: ibrar09/beneficiary-service:latest

      - name: 8. Build & Push Fraud Service
        uses: docker/build-push-action@v5
        with:
          context: ./fraud-service
          push: true
          tags: ibrar09/fraud-service:latest

      - name: 9. Build & Push Ledger Service
        uses: docker/build-push-action@v5
        with:
          context: ./ledger-service
          push: true
          tags: ibrar09/ledger-service:latest

      - name: 10. Build & Push Gateway Service
        uses: docker/build-push-action@v5
        with:
          context: ./gateway-service
          push: true
          tags: ibrar09/gateway-service:latest

  deploy-to-local-cluster:
    needs: build-and-push-microservices
    runs-on: self-hosted

    steps:
      - name: 1. Checkout K8s Manifests
        uses: actions/checkout@v3

      - name: 2. Apply Database & Messaging Infrastructure
        run: |
          kubectl apply -f k8s/databases/auth-db.yaml --validate=false
          kubectl apply -f k8s/databases/account-db.yaml --validate=false
          kubectl apply -f k8s/databases/transaction-db.yaml --validate=false
          kubectl apply -f k8s/databases/remaining-dbs.yaml --validate=false
          kubectl apply -f k8s/messaging/kafka.yaml --validate=false

      - name: 3. Apply Microservices
        run: |
          kubectl apply -f k8s/services/auth-service.yaml --validate=false
          kubectl apply -f k8s/services/account-service.yaml --validate=false
          kubectl apply -f k8s/services/transaction-service.yaml --validate=false
          kubectl apply -f k8s/services/remaining-services.yaml --validate=false
          kubectl apply -f k8s/services/gateway-service.yaml --validate=false

      - name: 4. Force Kubernetes to pull the new images
        run: |
          kubectl rollout restart deployment auth-service-deployment -n banking-system
          kubectl rollout restart deployment account-service-deployment -n banking-system
          kubectl rollout restart deployment transaction-service-deployment -n banking-system
          kubectl rollout restart deployment beneficiary-service-deployment -n banking-system
          kubectl rollout restart deployment fraud-service-deployment -n banking-system
          kubectl rollout restart deployment ledger-service-deployment -n banking-system
          kubectl rollout restart deployment gateway-service-deployment -n banking-system