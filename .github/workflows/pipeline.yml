name: Logic Miners Enterprise CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push-microservices:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Workspace Code
        uses: actions/checkout@v3

      - name: 2. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 3. Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ibrar09
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Account Service
      - name: 4. Build & Push Account Service
        uses: docker/build-push-action@v5
        with:
          context: ./account-service
          push: true
          tags: ibrar09/account-service:latest

      # Build & Push Transaction Service
      - name: 5. Build & Push Transaction Service
        uses: docker/build-push-action@v5
        with:
          context: ./transaction-service
          push: true
          tags: ibrar09/transaction-service:latest

      # Build & Push Beneficiary Service
      - name: 6. Build & Push Beneficiary Service
        uses: docker/build-push-action@v5
        with:
          context: ./beneficiary-service
          push: true
          tags: ibrar09/beneficiary-service:latest

      # Build & Push Fraud Service
      - name: 7. Build & Push Fraud Service
        uses: docker/build-push-action@v5
        with:
          context: ./fraud-service
          push: true
          tags: ibrar09/fraud-service:latest

      # Build & Push Ledger Service
      - name: 8. Build & Push Ledger Service
        uses: docker/build-push-action@v5
        with:
          context: ./ledger-service
          push: true
          tags: ibrar09/ledger-service:latest

      # Build & Push Gateway Service
      - name: 9. Build & Push Gateway Service
        uses: docker/build-push-action@v5
        with:
          context: ./gateway-service
          push: true
          tags: ibrar09/gateway-service:latest