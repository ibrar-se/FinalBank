apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service-deployment
  namespace: banking-system
  labels:
    app: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: ibrar09/gateway-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: banking-system
spec:
  type: LoadBalancer # This is the magic key that opens it to the outside world
  selector:
    app: gateway-service
  ports:
    - protocol: TCP
      port: 8090
      targetPort: 8090