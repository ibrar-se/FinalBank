apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-db-deployment
  namespace: banking-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: auth-db
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: auth_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: banking-system
spec:
  ports:
    - port: 5432
  selector:
    app: auth-db