version: '3.8'

services:
  # ==========================================
  # 1. THE INFRASTRUCTURE LAYER (Databases & Message Broker)
  # ==========================================

  # 🛑 THE SECURITY VAULT: Redis for JWT Blacklisting
  logicminers-redis:
    image: redis:7.0-alpine
    container_name: logicminers-redis
    ports:
      - "6379:6379"
    networks:
      - banking-network
    restart: unless-stopped

  auth-db:
    image: postgres:15-alpine
    container_name: logicminers-auth-db
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    restart: unless-stopped
    volumes:
      - auth_data:/var/lib/postgresql/data
    networks:
      - banking-network

  account-db:
    image: postgres:15-alpine
    container_name: logicminers-account-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: account_db
    restart: unless-stopped
    volumes:
      - account_data:/var/lib/postgresql/data
    networks:
      - banking-network

  transaction-db:
    image: postgres:15-alpine
    container_name: logicminers-transaction-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transaction_db
    restart: unless-stopped
    volumes:
      - transaction_data:/var/lib/postgresql/data
    networks:
      - banking-network

  beneficiary-db:
    image: postgres:15-alpine
    container_name: logicminers-beneficiary-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: beneficiary_db
    restart: unless-stopped
    volumes:
      - beneficiary_data:/var/lib/postgresql/data
    networks:
      - banking-network

  fraud-db:
    image: postgres:15-alpine
    container_name: logicminers-fraud-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fraud_db
    restart: unless-stopped
    volumes:
      - fraud_data:/var/lib/postgresql/data
    networks:
      - banking-network

  ledger-db:
    image: postgres:15-alpine
    container_name: logicminers-ledger-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledger_db
    restart: unless-stopped
    volumes:
      - ledger_data:/var/lib/postgresql/data
    networks:
      - banking-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: logicminers-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:29093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - banking-network

  # ==========================================
  # 2. THE MICROSERVICES LAYER (APIs & Processors)
  # ==========================================
  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8091:8090"
    depends_on:
      - auth-service
      - account-service
      - transaction-service
      - beneficiary-service
      - logicminers-redis # 🟢 ADDED: Gateway now waits for Redis
    networks:
      - banking-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8085:8085"
    depends_on:
      - auth-db
      - kafka
      - logicminers-redis # 🟢 ADDED: Auth Service now waits for Redis
    networks:
      - banking-network

  account-service:
    build: ./account-service
    container_name: account-service
    ports:
      - "8089:8081"
    depends_on:
      - account-db
      - kafka
    networks:
      - banking-network

  transaction-service:
    build: ./transaction-service
    container_name: transaction-service
    ports:
      - "8082:8082"
    depends_on:
      - transaction-db
      - kafka
    networks:
      - banking-network

  beneficiary-service:
    build: ./beneficiary-service
    container_name: beneficiary-service
    ports:
      - "8084:8084"
    depends_on:
      - beneficiary-db
    networks:
      - banking-network

  fraud-service:
    build: ./fraud-service
    container_name: fraud-service
    ports:
      - "8086:8086"
    depends_on:
      - fraud-db
      - kafka
    networks:
      - banking-network

  ledger-service:
    build: ./ledger-service
    container_name: ledger-service
    ports:
      - "8083:8083"
    depends_on:
      - ledger-db
      - kafka
    networks:
      - banking-network

# ==========================================
# 3. VIRTUAL NETWORK & VOLUMES
# ==========================================
networks:
  banking-network:
    driver: bridge

volumes:
  auth_data:
  account_data:
  transaction_data:
  beneficiary_data:
  fraud_data:
  ledger_data:
  kafka_data: