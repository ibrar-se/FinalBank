server:
  port: 8090

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        # 1. The Auth Service (The Front Door)
        - id: auth-service
          uri: http://auth-service:8085
          predicates:
            - Path=/api/v1/auth/**
          # 🛑 THE MISSING PIECE: The Translator Filter!

        # 2. The Account Service (The Bank Vault)
        - id: account-service
          uri: http://account-service:8081
          predicates:
            - Path=/api/v1/accounts/**

        # 3. The Transaction Service (The Money Mover)
        - id: transaction-service
          uri: http://transaction-service:8082
          predicates:
            - Path=/api/v1/transactions/**

        # 4. The Beneficiary Service
        - id: beneficiary-service
          uri: http://beneficiary-service:8084
          predicates:
            - Path=/api/beneficiaries/**

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

eureka:
  client:
    enabled: false

data :
  redis:
    host: logicminers-redis
    port: 6379
logging:
  level:
    org.springframework.cloud.gateway: TRACE
    reactor.netty.http.server: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"

