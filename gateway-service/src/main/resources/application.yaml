server:
  port: 8090

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: account-service
              # PIVOT 1: Points to internal service name and container port 8081
              uri: http://account-service:8081
              predicates:
                - Path=/api/v1/accounts/**

            - id: transaction-service
              # PIVOT 2: Points to internal service name and container port 8082
              uri: http://transaction-service:8082
              predicates:
                - Path=/api/v1/transactions/**

            - id: beneficiary-service
              # PIVOT 3: Points to internal service name and container port 8084
              uri: http://beneficiary-service:8084
              predicates:
                - Path=/api/beneficiaries/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000" # Keep this as localhost for your React app
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

eureka:
  client:
    enabled: false

logging:
  level:
    org.springframework.cloud.gateway: INFO